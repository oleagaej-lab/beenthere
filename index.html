<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>BeenThere 🌍</title>

    <script src="https://unpkg.com/globe.gl/dist/globe.gl.min.js"></script>

    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0f172a;
        color: white;
        text-align: center;
      }

      h1 {
        margin-top: 20px;
      }

      #globeViz {
        width: 100vw;
        height: 65vh;
      }

      button {
        padding: 10px 20px;
        margin: 10px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
      }

      .primary {
        background: #2563eb;
        color: white;
      }

      input {
        padding: 10px;
        width: 60%;
        max-width: 400px;
        margin: 10px auto 0 auto;
        display: block;
        border-radius: 8px;
        border: none;
        font-size: 14px;
      }

      #suggestions {
        width: 60%;
        max-width: 400px;
        margin: 0 auto;
        background: white;
        color: black;
        border-radius: 8px;
        text-align: left;
        display: none;
        max-height: 200px;
        overflow-y: auto;
      }

      #suggestions div {
        padding: 8px;
        cursor: pointer;
      }

      #suggestions div:hover {
        background: #e5e7eb;
      }

      #stats {
        width: 60%;
        margin: 10px auto;
      }

      #progressText {
        margin-bottom: 6px;
        font-weight: bold;
      }

      #progressBarContainer {
        width: 100%;
        height: 20px;
        background: #1e293b;
        border-radius: 10px;
        overflow: hidden;
      }

      #progressBar {
        height: 100%;
        width: 0%;
        background: #2563eb;
        transition: width 0.4s ease;
      }
    </style>
  </head>

  <body>
    <h1>BeenThere 🌍</h1>

    <button id="loginBtn" class="primary">Login with Google</button>

    <input type="text" id="citySearch" placeholder="Search city..." />
    <div id="suggestions"></div>

    <div id="stats">
      <div id="progressText">🌍 0 countries visited (0%)</div>
      <div id="progressBarContainer">
        <div id="progressBar"></div>
      </div>
    </div>

    <div id="globeViz"></div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
      import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
      import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyAW55OcrQaJy6iwidqi35Rn5JXEnKnEtbs",
    authDomain: "beenthere-35029.firebaseapp.com",
    projectId: "beenthere-35029",
    storageBucket: "beenthere-35029.firebasestorage.app",
    messagingSenderId: "424430201561",
    appId: "1:424430201561:web:0877f54d297f2e1921acc8"
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);
      const provider = new GoogleAuthProvider();

      let currentUser = null;
      let visitedCountries = [];
      let visitedCities = [];
      let totalCountries = 0;

      const loginBtn = document.getElementById("loginBtn");
      const globeContainer = document.getElementById("globeViz");
      const cityInput = document.getElementById("citySearch");
      const suggestionsDiv = document.getElementById("suggestions");

      loginBtn.addEventListener("click", () => {
        signInWithPopup(auth, provider);
      });

      onAuthStateChanged(auth, async (user) => {
        if (user) {
          currentUser = user;
          loginBtn.style.display = "none";

          const docRef = doc(db, "users", user.uid);
          const docSnap = await getDoc(docRef);

          if (docSnap.exists()) {
            visitedCountries = docSnap.data().visited || [];
            visitedCities = docSnap.data().visitedCities || [];
          }

          updateGlobe();
          updateCities();
          updateProgress();
        }
      });

      function updateGlobe() {
        globe.polygonCapColor(d =>
          visitedCountries.includes(d.properties.name)
            ? "#2563eb"
            : "yellow"
        );
      }

      function updateCities() {
        globe.pointsData([]); // reset obligatorio

        globe
          .pointsData(visitedCities)
          .pointLat(d => d.lat)
          .pointLng(d => d.lng)
          .pointColor(() => "#f59e0b")
          .pointAltitude(0.03)
          .pointRadius(0.6);
      }

      function updateProgress() {
        const count = visitedCountries.length;
        const percent = totalCountries
          ? Math.round((count / totalCountries) * 100)
          : 0;

        document.getElementById("progressText").innerText =
          `🌍 ${count} countries visited (${percent}%)`;

        document.getElementById("progressBar").style.width = percent + "%";
      }

      const Globe = window.Globe;
      const globe = Globe()(globeContainer)
        .globeImageUrl("//unpkg.com/three-globe/example/img/earth-night.jpg")
        .backgroundColor("#0f172a");

      globe.pointsData([]); // inicializar puntos

      fetch("https://raw.githubusercontent.com/holtzy/D3-graph-gallery/master/DATA/world.geojson")
        .then(res => res.json())
        .then(countries => {

          countries.features.forEach(f => {
            if (f.properties.name === "Falkland Islands") {
              f.properties.name = "Argentina";
            }
          });

          totalCountries = countries.features.length;
          updateProgress();

          globe
            .polygonsData(countries.features)
            .polygonAltitude(0.01)
            .polygonSideColor(() => "rgba(0,0,0,0.05)")
            .polygonStrokeColor(() => "rgba(255,255,255,0.6)")
            .polygonCapColor(d =>
              visitedCountries.includes(d.properties.name)
                ? "#2563eb"
                : "yellow"
            )
            .onPolygonClick(async (d) => {
              if (!currentUser) {
                alert("Login first");
                return;
              }

              const countryName = d.properties.name;

              if (visitedCountries.includes(countryName)) {
                visitedCountries = visitedCountries.filter(c => c !== countryName);
              } else {
                visitedCountries.push(countryName);
              }

              await setDoc(doc(db, "users", currentUser.uid), {
                visited: visitedCountries,
                visitedCities: visitedCities
              });

              updateGlobe();
              updateProgress();
            });
        });

      const cities = [
        { name: "Buenos Aires", lat: -34.61, lng: -58.38, country: "Argentina" },
        { name: "Santiago", lat: -33.45, lng: -70.66, country: "Chile" },
        { name: "São Paulo", lat: -23.55, lng: -46.63, country: "Brasil" },
        { name: "Paris", lat: 48.85, lng: 2.35, country: "France" },
        { name: "London", lat: 51.50, lng: -0.12, country: "United Kingdom" },
        { name: "New York", lat: 40.71, lng: -74.01, country: "USA" }
      ];

      cityInput.addEventListener("input", () => {
        const query = cityInput.value.trim().toLowerCase();

        if (!query) {
          suggestionsDiv.style.display = "none";
          return;
        }

        const matches = cities
          .filter(c => c.name.toLowerCase().includes(query))
          .slice(0, 5);

        suggestionsDiv.innerHTML = "";

        if (matches.length === 0) {
          suggestionsDiv.style.display = "none";
          return;
        }

        matches.forEach(city => {
          const div = document.createElement("div");
          div.innerText = `${city.name} (${city.country})`;

          div.addEventListener("click", () => selectCity(city));

          suggestionsDiv.appendChild(div);
        });

        suggestionsDiv.style.display = "block";
      });

      cityInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          const firstSuggestion = suggestionsDiv.querySelector("div");
          if (firstSuggestion) {
            firstSuggestion.click();
          }
        }
      });

      async function selectCity(city) {
        if (!currentUser) {
          alert("Login first");
          return;
        }

        if (!visitedCities.find(c => c.name === city.name)) {
          visitedCities.push(city);
        }

        if (!visitedCountries.includes(city.country)) {
          visitedCountries.push(city.country);
        }

        await setDoc(doc(db, "users", currentUser.uid), {
          visited: visitedCountries,
          visitedCities: visitedCities
        });

        updateGlobe();
        updateCities();
        updateProgress();

        cityInput.value = "";
        suggestionsDiv.style.display = "none";
      }
    </script>
  </body>
</html>
