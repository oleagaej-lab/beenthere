<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>BeenThere 🌍</title>

    <!-- Globe library -->
    <script src="https://unpkg.com/globe.gl/dist/globe.gl.min.js"></script>

    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0f172a;
        color: white;
        text-align: center;
      }

      h1 {
        margin-top: 20px;
      }

      #globeViz {
        width: 100vw;
        height: 80vh;
      }

      button {
        padding: 10px 20px;
        margin: 10px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
      }

      .primary {
        background: #2563eb;
        color: white;
      }

      #stats {
  width: 60%;
  margin: 10px auto;
}

#progressText {
  margin-bottom: 6px;
  font-weight: bold;
}

#progressBarContainer {
  width: 100%;
  height: 20px;
  background: #1e293b;
  border-radius: 10px;
  overflow: hidden;
}

#progressBar {
  height: 100%;
  width: 0%;
  background: #2563eb;
  transition: width 0.4s ease;
}
    </style>
  </head>

  <body>
    <h1>BeenThere 🌍</h1>

    <button id="loginBtn" class="primary">
      Login with Google
    </button>

    <div id="globeViz"></div>

    <!-- FIREBASE + LOGICA -->
    <script type="module">

      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
      import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged }
      from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
      import { getFirestore, doc, setDoc, getDoc }
      from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyAW55OcrQaJy6iwidqi35Rn5JXEnKnEtbs",
    authDomain: "beenthere-35029.firebaseapp.com",
    projectId: "beenthere-35029",
    storageBucket: "beenthere-35029.firebasestorage.app",
    messagingSenderId: "424430201561",
    appId: "1:424430201561:web:0877f54d297f2e1921acc8"
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);
      const provider = new GoogleAuthProvider();

      let currentUser = null;
      let visitedCountries = [];
      let totalCountries = 0;

      const loginBtn = document.getElementById("loginBtn");
      const globeContainer = document.getElementById("globeViz");

      // LOGIN
      loginBtn.addEventListener("click", () => {
        signInWithPopup(auth, provider);
      });

      onAuthStateChanged(auth, async (user) => {
        if (user) {
          currentUser = user;
          loginBtn.style.display = "none";

          const docRef = doc(db, "users", user.uid);
          const docSnap = await getDoc(docRef);

          if (docSnap.exists()) {
            visitedCountries = docSnap.data().visited || [];
          }

          updateGlobe();
          updateProgress();
        }
      });

<div id="stats">
  <div id="progressText">🌍 0 countries visited (0%)</div>
  <div id="progressBarContainer">
    <div id="progressBar"></div>
  </div>
</div>

      
      // GLOBO
      const Globe = window.Globe;

      const globe = Globe()
        (globeContainer)
        .globeImageUrl("//unpkg.com/three-globe/example/img/earth-night.jpg")
        .backgroundColor("#0f172a");

      fetch("https://raw.githubusercontent.com/holtzy/D3-graph-gallery/master/DATA/world.geojson")
        .then(res => res.json())
        .then(countries => {
          totalCountries = countries.features.length;
updateProgress();
          globe
            .polygonsData(countries.features)
            .polygonAltitude(0.01)
            .polygonCapColor(d =>
              visitedCountries.includes(d.properties.name)
                ? "#2563eb"
                : "yellow"
            )
            .polygonSideColor(() => "rgba(0,0,0,0.05)")
.polygonStrokeColor(() => "rgba(255,255,255,0.6)")
            .onPolygonClick(async (d) => {
              if (!currentUser) {
                alert("Login first");
                return;
              }

              const countryName = d.properties.name;

              if (visitedCountries.includes(countryName)) {
  // Si ya estaba visitado → lo quitamos
  visitedCountries = visitedCountries.filter(
    c => c !== countryName
  );
} else {
  // Si no estaba → lo agregamos
  visitedCountries.push(countryName);
}

await setDoc(doc(db, "users", currentUser.uid), {
  visited: visitedCountries
});

updateGlobe();
              function updateProgress() {
  const count = visitedCountries.length;
  const percent = totalCountries
    ? Math.round((count / totalCountries) * 100)
    : 0;

  document.getElementById("progressText").innerText =
    `🌍 ${count} countries visited (${percent}%)`;

  document.getElementById("progressBar").style.width =
    percent + "%";
}
            });
        });

      function updateGlobe() {
        globe.polygonCapColor(d =>
          visitedCountries.includes(d.properties.name)
            ? "#2563eb"
            : "yellow"
        );
      }

    </script>
  </body>
</html>
